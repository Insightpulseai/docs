trigger:
  branches:
    include:
      - main
  paths:
    include:
      - '**/*.html'
      - '**/*.css'
      - '**/*.md'
      - azure-pipelines.yml

resources:
  repositories:
    - repository: templates
      type: github
      name: Insightpulseai/infra
      endpoint: github-insightpulseai

pool:
  vmImage: ubuntu-latest

variables:
  - name: targetBranch
    value: gh-pages

steps:
  - checkout: self
    persistCredentials: true
    fetchDepth: 0

  - script: |
      set -euo pipefail

      git config user.email "azdo-pipeline@insightpulseai.com"
      git config user.name "AzDO Pages Deploy"

      mkdir -p _site
      cp index.html _site/
      cp -r assets _site/assets 2>/dev/null || true
      touch _site/.nojekyll

      cd _site
      git init
      git checkout -b $(targetBranch)
      git config user.email "azdo-pipeline@insightpulseai.com"
      git config user.name "AzDO Pages Deploy"
      git add -A
      git commit -m "deploy: pages from $(Build.SourceVersion) [skip ci]"

      git remote add origin $(Build.Repository.Uri)
      git push --force origin $(targetBranch)
    displayName: Deploy to gh-pages branch
